<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background -->
  <circle cx="16" cy="16" r="16" fill="#0B1026"/>

  <!-- Crescent moon via clipPath -->
  <defs>
    <clipPath id="mc">
      <circle cx="14.5" cy="16" r="10"/>
    </clipPath>
  </defs>
  <circle cx="14.5" cy="16" r="10" fill="#D9A441"/>
  <circle cx="19.5" cy="12.5" r="8.8" fill="#0B1026" clip-path="url(#mc)"/>

  <!-- Gold rim glow hint on crescent tip -->
  <circle cx="13" cy="7.5" r="1.1" fill="#F3B68D" opacity="0.75"/>

  <!-- Stars -->
  <circle cx="25"  cy="9"  r="1.3" fill="#D9A441" opacity="0.80"/>
  <circle cx="26"  cy="21" r="0.9" fill="#D9A441" opacity="0.55"/>
  <circle cx="7"   cy="10" r="0.7" fill="#D9A441" opacity="0.45"/>
  <circle cx="6"   cy="23" r="0.6" fill="#D9A441" opacity="0.35"/>
</svg>
